---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fika Picker 🐝</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
      touch-action: manipulation;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg,
        #4A9CC7 0%,
        #87CEEB 28%,
        #C8EAFB 55%,
        #8DC94A 55%,
        #5A9E2F 62%,
        #3A7A1A 100%
      );
    }

    /* Decorative clouds */
    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.75);
      border-radius: 50px;
      pointer-events: none;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.75);
      border-radius: 50%;
    }
    .cloud-1 { width: 80px; height: 24px; top: 8%; left: 12%; }
    .cloud-1::before { width: 36px; height: 36px; top: -18px; left: 10px; }
    .cloud-1::after  { width: 26px; height: 26px; top: -12px; left: 38px; }

    .cloud-2 { width: 110px; height: 28px; top: 14%; right: 10%; }
    .cloud-2::before { width: 44px; height: 44px; top: -22px; left: 14px; }
    .cloud-2::after  { width: 32px; height: 32px; top: -16px; left: 54px; }

    .cloud-3 { width: 60px; height: 18px; top: 5%; left: 55%; }
    .cloud-3::before { width: 28px; height: 28px; top: -14px; left: 8px; }
    .cloud-3::after  { width: 20px; height: 20px; top: -10px; left: 30px; }

    /* UI panel */
    #ui {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 100;
    }

    #ui h1 {
      font-size: clamp(1.1rem, 4.5vw, 2rem);
      color: #1a3a1a;
      text-shadow: 0 1px 6px rgba(255,255,255,0.95), 0 2px 12px rgba(255,255,255,0.7);
      margin-bottom: 1.3rem;
      line-height: 1.35;
    }

    #launchBtn {
      background: linear-gradient(135deg, #FFE033 0%, #FFA500 100%);
      border: none;
      border-radius: 50px;
      padding: 14px 34px;
      font-size: clamp(1rem, 3.5vw, 1.4rem);
      font-family: Georgia, serif;
      font-weight: bold;
      color: #333;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(255,160,0,0.55), 0 2px 5px rgba(0,0,0,0.15);
      transition: transform 0.12s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    #launchBtn:hover { transform: scale(1.07); box-shadow: 0 6px 24px rgba(255,160,0,0.65); }
    #launchBtn:active { transform: scale(0.95); }

    /* Bees */
    .bee {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 50;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .bee-label {
      font-size: clamp(0.55rem, 1.8vw, 0.82rem);
      background: rgba(255,255,255,0.92);
      border-radius: 10px;
      padding: 2px 7px;
      margin-top: 2px;
      white-space: nowrap;
      color: #222;
      font-weight: bold;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      line-height: 1.4;
    }

    .bee.idle {
      animation: idlefloat var(--float-dur, 2.2s) ease-in-out infinite;
      animation-delay: var(--float-delay, 0s);
    }

    @keyframes idlefloat {
      0%   { transform: translate(-50%, -50%) translateY(0px)   rotate(0deg); }
      30%  { transform: translate(-50%, -50%) translateY(-5px)  rotate(3deg); }
      70%  { transform: translate(-50%, -50%) translateY(4px)   rotate(-3deg); }
      100% { transform: translate(-50%, -50%) translateY(0px)   rotate(0deg); }
    }

    .bee.buzzing {
      animation: beewobble 0.18s ease-in-out infinite alternate;
    }

    @keyframes beewobble {
      from { transform: translate(-50%, -50%) rotate(-7deg) translateY(0px); }
      to   { transform: translate(-50%, -50%) rotate(7deg)  translateY(-3px); }
    }

    .bee.settling {
      animation: none !important;
      transition: left 1.8s cubic-bezier(0.34, 1.46, 0.64, 1),
                  top  1.8s cubic-bezier(0.34, 1.46, 0.64, 1);
    }

    .bee.winner .bee-label {
      background: #FFD700;
      animation: winpulse 0.9s ease-in-out infinite alternate;
    }

    @keyframes winpulse {
      from { box-shadow: 0 0 6px rgba(255,200,0,0.5); }
      to   { box-shadow: 0 0 22px rgba(255,200,0,1), 0 0 40px rgba(255,200,0,0.5); }
    }

    /* Flowers */
    .flower {
      position: absolute;
      bottom: 0;
      transform: translateX(-50%);
      z-index: 10;
    }

    .fika-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(0.7rem, 2vw, 0.95rem);
      font-weight: bold;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      white-space: nowrap;
      pointer-events: none;
      top: -22px;
    }

    /* Winner banner */
    #winner-banner {
      display: none;
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.97);
      border: 3px solid #FFD700;
      border-radius: 22px;
      padding: 14px 30px 16px;
      font-size: clamp(0.9rem, 3.5vw, 1.45rem);
      color: #222;
      text-align: center;
      box-shadow: 0 4px 24px rgba(255,190,0,0.45);
      z-index: 200;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      line-height: 1.5;
    }

    @keyframes popIn {
      0%   { transform: translateX(-50%) scale(0.3); opacity: 0; }
      100% { transform: translateX(-50%) scale(1);   opacity: 1; }
    }

    .again-btn {
      display: inline-block;
      margin-top: 10px;
      background: #f7f7f7;
      border: 2px solid #ccc;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 0.8em;
      font-family: Georgia, serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .again-btn:hover { background: #eee; }
  </style>
</head>
<body>
<div id="scene">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <div id="ui">
    <h1>Who is hosting<br>Fika next week?</h1>
    <button id="launchBtn" onclick="launchBees()">Launch the bees 🐝</button>
  </div>

  <div id="winner-banner"></div>
</div>

<script>
// ── People list (injected by Jekyll at build time) ─────────────────────────
const PEOPLE = {{ site.data.people | jsonify }};

// ── State ──────────────────────────────────────────────────────────────────
let bees = [], flowers = [], audioCtx = null, buzzNodes = null, buzzInterval = null;
let running = false;

// ── Dimensions ─────────────────────────────────────────────────────────────
const GRASS_FRAC = 0.45;  // bottom fraction = grass/ground
const W = () => window.innerWidth;
const H = () => window.innerHeight;
const skyH = () => H() * (1 - GRASS_FRAC);

// ── Bee SVG ────────────────────────────────────────────────────────────────
function beeSVG(size) {
  return `<svg width="${size}" height="${Math.round(size * 0.92)}" viewBox="0 0 40 37" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="11" cy="10" rx="11" ry="7" fill="rgba(210,238,255,0.82)" stroke="#99b" stroke-width="0.7">
      <animate attributeName="ry" values="7;1.5;7" dur="0.14s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="29" cy="10" rx="11" ry="7" fill="rgba(210,238,255,0.82)" stroke="#99b" stroke-width="0.7">
      <animate attributeName="ry" values="7;1.5;7" dur="0.14s" repeatCount="indefinite" begin="0.07s"/>
    </ellipse>
    <ellipse cx="20" cy="26" rx="11" ry="11" fill="#FFD700"/>
    <rect x="10" y="21" width="20" height="5" fill="#222" rx="2.5"/>
    <rect x="10" y="28" width="20" height="5" fill="#222" rx="2.5"/>
    <circle cx="20" cy="13" r="6.5" fill="#FFD700"/>
    <circle cx="17" cy="12" r="1.7" fill="#111"/>
    <circle cx="23" cy="12" r="1.7" fill="#111"/>
    <circle cx="17.7" cy="11.3" r="0.6" fill="#fff"/>
    <circle cx="23.7" cy="11.3" r="0.6" fill="#fff"/>
    <path d="M17 15.5 Q20 18.5 23 15.5" stroke="#111" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <line x1="17" y1="7.5" x2="13" y2="1.5" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="13" cy="1" r="1.8" fill="#333"/>
    <line x1="23" y1="7.5" x2="27" y2="1.5" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="27" cy="1" r="1.8" fill="#333"/>
  </svg>`;
}

// ── Flower SVG ─────────────────────────────────────────────────────────────
function flowerSVG(stemH, isFika) {
  const FW = 58, headY = 28;
  const totalH = stemH + headY + 16;
  const petals = isFika
    ? ['#FF6BA8','#FF85B8','#FF5098','#FF77B2','#FF3E8A','#FF96C2']
    : ['#FF9040','#FFAF60','#FF7820','#FFC060','#FF6010','#FFB545'];
  const centre = isFika ? '#FFE033' : '#FF5533';

  let petalEls = '';
  for (let i = 0; i < 6; i++) {
    const a = (i * 60 - 90) * Math.PI / 180;
    const px = (FW / 2 + 16 * Math.cos(a)).toFixed(1);
    const py = (headY + 16 * Math.sin(a)).toFixed(1);
    petalEls += `<ellipse cx="${px}" cy="${py}" rx="9" ry="5.5"
      fill="${petals[i]}" transform="rotate(${i * 60} ${px} ${py})"/>`;
  }

  return `<svg width="${FW}" height="${totalH}" viewBox="0 0 ${FW} ${totalH}" xmlns="http://www.w3.org/2000/svg">
    <path d="M${FW/2} ${totalH - 4} Q${FW/2 - 3} ${totalH - stemH * 0.45} ${FW/2} ${headY + 15}"
      stroke="#4A8A2A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="${FW/2 - 10}" cy="${totalH - stemH * 0.48}" rx="11" ry="5"
      fill="#6AAB3A" transform="rotate(-38 ${FW/2 - 10} ${totalH - stemH * 0.48})"/>
    ${petalEls}
    <circle cx="${FW/2}" cy="${headY}" r="10" fill="${centre}"/>
    ${isFika ? `<text x="${FW/2}" y="${headY + 4.5}" text-anchor="middle" font-size="10" fill="#7a2000" font-weight="bold">✿</text>` : ''}
  </svg>`;
}

// ── Build scene ────────────────────────────────────────────────────────────
function buildScene() {
  const scene = document.getElementById('scene');
  scene.querySelectorAll('.bee, .flower').forEach(el => el.remove());
  document.getElementById('winner-banner').style.display = 'none';
  document.getElementById('ui').style.display = '';

  bees = []; flowers = [];
  const n = PEOPLE.length;
  const w = W(), h = H(), sh = skyH(), gH = h * GRASS_FRAC;
  const spacing = w / (n + 1);
  const fikaIdx = Math.floor(n / 2);

  // Flower sizing — responsive
  const stemH = Math.max(40, Math.min(gH * 0.72, 100));
  const fikaStemH = stemH * 1.2;
  const beeSize = Math.round(Math.min(Math.max(26, w / (n * 1.6 + 3)), 46));

  for (let i = 0; i < n; i++) {
    const isFika = (i === fikaIdx);
    const x = spacing * (i + 1);
    const sH = isFika ? fikaStemH : stemH;
    const totalFlH = sH + 28 + 16;  // headY=28, bottom pad=16
    const petalTopVP = h - totalFlH; // viewport-y of flower SVG top

    // Flower
    const fDiv = document.createElement('div');
    fDiv.className = 'flower';
    fDiv.style.left = x + 'px';
    fDiv.innerHTML = flowerSVG(sH, isFika);
    if (isFika) {
      const lbl = document.createElement('div');
      lbl.className = 'fika-label';
      lbl.textContent = 'Fika';
      fDiv.appendChild(lbl);
    }
    scene.appendChild(fDiv);
    flowers.push({ x, petalTopVP, isFika });

    // Bee — random scatter in upper sky
    const bx = 60 + Math.random() * (w - 120);
    const by = sh * 0.06 + Math.random() * (sh * 0.42);
    const bDiv = document.createElement('div');
    bDiv.className = 'bee idle';
    bDiv.style.left = bx + 'px';
    bDiv.style.top = by + 'px';
    bDiv.style.setProperty('--float-dur', (1.7 + Math.random() * 1.4) + 's');
    bDiv.style.setProperty('--float-delay', (-Math.random() * 2.5) + 's');
    bDiv.innerHTML = beeSVG(beeSize) + `<div class="bee-label">${PEOPLE[i]}</div>`;
    scene.appendChild(bDiv);
    bees.push({ el: bDiv, x: bx, y: by, vx: 0, vy: 0, flowerIdx: null });
  }
}

// ── Random flower assignment ───────────────────────────────────────────────
function assignFlowers() {
  const idxs = PEOPLE.map((_, i) => i);
  for (let i = idxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
  }
  bees.forEach((b, i) => b.flowerIdx = idxs[i]);
}

// ── Audio ──────────────────────────────────────────────────────────────────
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function startBuzz() {
  ensureAudio();
  const ctx = audioCtx;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 0.4);
  master.connect(ctx.destination);

  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = 165;

  const lfo = ctx.createOscillator();
  const lfoG = ctx.createGain();
  lfo.frequency.value = 24;
  lfoG.gain.value = 48;
  lfo.connect(lfoG);
  lfoG.connect(osc.frequency);

  osc.connect(master);
  lfo.start(); osc.start();
  buzzNodes = { osc, lfo, master };
}

function stopBuzz() {
  if (!buzzNodes) return;
  const { osc, lfo, master } = buzzNodes;
  master.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
  setTimeout(() => { try { osc.stop(); lfo.stop(); } catch(e) {} buzzNodes = null; }, 700);
}

function playAhh() {
  ensureAudio();
  const ctx = audioCtx;
  // Warm C-major chord, notes stagger in softly
  [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.06;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.13, t + 0.45);
    gain.gain.linearRampToValueAtTime(0.08, t + 1.8);
    gain.gain.linearRampToValueAtTime(0, t + 4);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 4.5);
  });
}

// ── Buzz movement ──────────────────────────────────────────────────────────
function startBuzzMove() {
  const sh = skyH();
  bees.forEach(b => b.el.classList.add('buzzing'));
  buzzInterval = setInterval(() => {
    const w = W();
    bees.forEach(b => {
      b.vx = b.vx * 0.72 + (Math.random() - 0.5) * 20;
      b.vy = b.vy * 0.72 + (Math.random() - 0.5) * 14;
      b.x = Math.max(28, Math.min(w - 28, b.x + b.vx));
      b.y = Math.max(18, Math.min(sh * 0.86, b.y + b.vy));
      b.el.style.left = b.x + 'px';
      b.el.style.top  = b.y + 'px';
    });
  }, 95);
}

function stopBuzzMove() {
  clearInterval(buzzInterval);
  buzzInterval = null;
  bees.forEach(b => b.el.classList.remove('buzzing'));
}

// ── Settle onto flowers ────────────────────────────────────────────────────
function settleBees() {
  const beeEl = bees[0]?.el;
  const beeH = beeEl ? beeEl.offsetHeight : 52;

  bees.forEach(b => {
    const f = flowers[b.flowerIdx];
    // Land bee center just above the petal head
    // petalTopVP = viewport-y of SVG top; petal centre is 28px down from SVG top
    const petalCentreY = f.petalTopVP + 28;
    const tx = f.x;
    const ty = petalCentreY - beeH * 0.75;
    b.el.classList.add('settling');
    b.el.style.left = tx + 'px';
    b.el.style.top  = ty + 'px';
  });

  setTimeout(revealWinner, 2000);
}

function revealWinner() {
  const fikaFlowerIdx = flowers.findIndex(f => f.isFika);
  const winner = bees.find(b => b.flowerIdx === fikaFlowerIdx);
  winner.el.classList.add('winner');

  const banner = document.getElementById('winner-banner');
  banner.innerHTML = `🐝 <strong>${winner.el.querySelector('.bee-label').textContent}</strong> is hosting Fika next week! 🐝
    <br><button class="again-btn" onclick="resetScene()">Try again</button>`;
  banner.style.display = 'block';

  playAhh();
  running = false;
}

// ── Launch & reset ─────────────────────────────────────────────────────────
function launchBees() {
  if (running) return;
  running = true;

  assignFlowers();
  document.getElementById('ui').style.display = 'none';
  bees.forEach(b => b.el.classList.remove('idle'));

  startBuzz();
  startBuzzMove();

  setTimeout(() => {
    stopBuzzMove();
    stopBuzz();
    settleBees();
  }, 2300);
}

function resetScene() {
  stopBuzzMove();
  if (buzzNodes) stopBuzz();
  running = false;
  buildScene();
}

// ── Init ───────────────────────────────────────────────────────────────────
buildScene();

let resizeTimer;
window.addEventListener('resize', () => {
  if (running) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildScene, 250);
});
</script>
</body>
</html>
